controller_manager:
  ros__parameters:
    update_rate: 200 #Hertz
    use_sim_time: true #Using gazebo so needs to be true

    #Publishes the joint states
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      

    arm_position_controller:
      type: position_controllers/JointGroupPositionController


joint_state_broadcaster:
  ros__parameters:
    update_rate: 50

arm_position_controller:
  ros__parameters:

    joints:
      - base_joint
      - first_arm_joint
      - second_arm_joint
